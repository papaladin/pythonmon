name: Build executables

# Runs automatically when you publish a GitHub Release,
# OR manually from the Actions tab (build only, no upload).
on:
  release:
    types: [published]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: pokemain.exe
            asset_name: pokemain-windows.exe
          - os: macos-latest
            artifact_name: pokemain
            asset_name: pokemain-macos
          - os: ubuntu-latest
            artifact_name: pokemain
            asset_name: pokemain-linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests pyinstaller

      - name: Build executable
        run: python build.py
        env:
          PYTHONUTF8: "1"

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv dist/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: Rename-Item dist\${{ matrix.artifact_name }} ${{ matrix.asset_name }}
        shell: pwsh

      - name: Upload artifact (always — downloadable from Actions run page)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 30

      - name: Upload to GitHub Release (only when triggered by a release)
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          token: ${{ secrets.GITHUB_TOKEN }}